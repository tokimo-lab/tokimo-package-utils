name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  linux:
    name: linux (build + clippy + test)
    runs-on: ubuntu-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --bins --tests -- -D warnings
      - run: cargo build --lib --bins --tests
      - run: cargo test --lib --bins

  macos:
    name: macos (build + clippy + test)
    runs-on: macos-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --bins --tests -- -D warnings
      - run: cargo build --lib --bins --tests
      - run: cargo test --lib --bins

  windows:
    name: windows (build + clippy + test)
    runs-on: windows-latest
    needs: fmt
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib --bins --tests -- -D warnings
      - run: cargo build --lib --bins --tests
      - run: cargo test --lib --bins
